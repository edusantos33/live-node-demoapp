name: Security checks

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    name: Test, SAST, SCA and secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: npm run lint

      - name: Automated tests
        run: npm test

      - name: Bearer SAST - block critical and high
        uses: bearer/bearer-action@v2
        env:
          BEARER_FAIL_ON_SEVERITY: critical,high
        with:
          path: .
          scanner: sast
          severity: critical,high

      - name: OWASP Dependency-Check SCA - block high and critical CVSS
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: ghscd-live-node-demoapp
          path: .
          format: HTML
          out: reports
          args: >
            --failOnCVSS 7
            --enableRetired
            --scan package.json
            --scan node_modules

      - name: Upload Dependency-Check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
